<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Salonicas Vision OS</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700&display=swap');

        :root {
            --neon-cyan: #00f2ff;
            --dark-background: #1a1a1d;
            --light-gray: #e0e0e0;
            --medium-gray: #a0a0a0;
        }

        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Inter', sans-serif;
            background-color: var(--dark-background);
            color: var(--light-gray);
            display: flex;
            flex-direction: column;
            height: 100vh;
            width: 100vw;
            position: relative;
        }

        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: var(--dark-background);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            font-size: 2em;
            color: var(--neon-cyan);
            transition: opacity 0.5s ease-in-out;
        }

        .loading-overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .split-screen {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .top-section {
            flex: 0.6;
            position: relative;
            background-color: var(--dark-background);
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .bottom-section {
            flex: 0.4;
            position: relative;
            background-color: black;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        #webcamVideo {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1); /* Mirror the feed */
        }

        #webcamCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
        }

        .branding {
            position: absolute;
            bottom: 15px;
            right: 15px;
            font-size: 1.2em;
            font-weight: 700;
            color: var(--neon-cyan);
            text-shadow: 0 0 10px var(--neon-cyan);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .branding .greek-flag {
            width: 30px;
            height: 20px;
            background: linear-gradient(to bottom, white 50%, #005eff 50%);
            position: relative;
        }

        .branding .greek-flag::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: repeating-linear-gradient(
                to bottom,
                white 0, white 10px,
                #005eff 10px, #005eff 20px
            );
        }

        .branding .greek-flag::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: repeating-linear-gradient(
                to right,
                white 0, white 15px,
                #005eff 15px, #005eff 30px
            );
        }

        .branding .greek-flag::before,
        .branding .greek-flag::after {
            mix-blend-mode: multiply;
            opacity: 0.7;
        }
        .branding .greek-flag {
            box-shadow: 0 0 5px var(--neon-cyan);
        }

        /* Responsive adjustments for mobile */
        @media (max-width: 600px) {
            .branding {
                font-size: 1em;
                bottom: 10px;
                right: 10px;
            }
            .branding .greek-flag {
                width: 25px;
                height: 17px;
            }
        }
    </style>
</head>
<body>
    <div class="loading-overlay">Loading Salonicas Vision OS...</div>

    <div class="split-screen">
        <div class="top-section">
            <div id="threejs-container"></div>
        </div>
        <div class="bottom-section">
            <video id="webcamVideo" autoplay playsinline></video>
            <canvas id="webcamCanvas"></canvas>
        </div>
    </div>

    <div class="branding">
        Salonicas
        <div class="greek-flag"></div>
    </div>

    <!-- CDNs -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>

    <script>
        const loadingOverlay = document.querySelector('.loading-overlay');
        const webcamVideo = document.getElementById('webcamVideo');
        const webcamCanvas = document.getElementById('webcamCanvas');
        const ctx = webcamCanvas.getContext('2d');
        const threejsContainer = document.getElementById('threejs-container');

        // --- Three.js Setup ---
        let scene, camera, renderer, earthMesh;
        let targetEarthRotationY = 0;
        let earthRotationSpeed = 0.0005; // Slow rotation
        let cameraControls = { zoom: 1 };
        let isEarthLoaded = false;

        function initThreeJS() {
            // Scene
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x0a0a0a); // Very dark background for 3D

            // Camera
            camera = new THREE.PerspectiveCamera(75, threejsContainer.offsetWidth / threejsContainer.offsetHeight, 0.1, 1000);
            camera.position.z = 5;

            // Renderer
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(threejsContainer.offsetWidth, threejsContainer.offsetHeight);
            threejsContainer.appendChild(renderer.domElement);

            // Lighting (Subtle, futuristic glow)
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.2);
            scene.add(ambientLight);

            const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
            directionalLight.position.set(5, 5, 5);
            scene.add(directionalLight);

            // Earth Geometry & Material
            const geometry = new THREE.SphereGeometry(1, 64, 64);
            const textureLoader = new THREE.TextureLoader();
            const earthTexture = textureLoader.load('https://threejs.org/examples/textures/land_ocean_map.jpg'); // A common Earth texture
            const material = new THREE.MeshStandardMaterial({
                map: earthTexture,
                roughness: 0.8,
                metalness: 0.1,
                color: 0xc0c0c0 // Slightly metallic sheen
            });

            earthMesh = new THREE.Mesh(geometry, material);
            scene.add(earthMesh);
            isEarthLoaded = true;

            animate();
        }

        function animate() {
            if (!isEarthLoaded) return;

            requestAnimationFrame(animate);

            // Smoothly rotate the Earth
            earthMesh.rotation.y += earthRotationSpeed;

            // Make Earth follow hand in X and Y
            // We'll update this based on hand tracking data

            // Apply zoom to camera
            camera.position.z = 5 * cameraControls.zoom;
            camera.lookAt(scene.position); // Ensure camera always looks at the center

            renderer.render(scene, camera);
        }

        function onWindowResize() {
            if (!isEarthLoaded) return;
            camera.aspect = threejsContainer.offsetWidth / threejsContainer.offsetHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(threejsContainer.offsetWidth, threejsContainer.offsetHeight);
        }

        // --- Webcam and MediaPipe Setup ---
        let hands = new Hands({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
        });

        hands.setOptions({
            staticImageMode: false,
            maxNumHands: 2,
            modelComplexity: 1,
            minDetectionConfidence: 0.5,
            minTrackingConfidence: 0.5
        });

        let isCameraReady = false;

        async function startWebcam() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                webcamVideo.srcObject = stream;
                webcamVideo.onloadedmetadata = () => {
                    webcamCanvas.width = webcamVideo.videoWidth;
                    webcamCanvas.height = webcamVideo.videoHeight;
                    ctx.canvas.width = webcamVideo.videoWidth;
                    ctx.canvas.height = webcamVideo.videoHeight;
                    isCameraReady = true;
                    loadingOverlay.classList.add('hidden'); // Hide loading when camera is ready
                    hands.onResults(onResults);
                    processVideo();
                };
            } catch (err) {
                console.error("Error accessing webcam:", err);
                loadingOverlay.innerHTML = "Camera access denied. Please grant permission.";
                // Keep loading overlay visible, but with an error message
            }
        }

        function processVideo() {
            if (!isCameraReady) return;
            ctx.drawImage(webcamVideo, 0, 0, webcamCanvas.width, webcamCanvas.height);
            hands.send({ image: webcamVideo });
            requestAnimationFrame(processVideo);
        }

        let lastHandLandmarks = null;
        let pinchStartDistance = null;
        let pinchStartZoom = 1;
        let activePinch = false;

        function onResults(results) {
            ctx.save();
            ctx.clearRect(0, 0, webcamCanvas.width, webcamCanvas.height);
            ctx.drawImage(webcamVideo, 0, 0, webcamCanvas.width, webcamCanvas.height);

            const videoWidth = webcamCanvas.width;
            const videoHeight = webcamCanvas.height;

            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                lastHandLandmarks = results.multiHandLandmarks; // Store for 3D interaction

                for (const landmarks of results.multiHandLandmarks) {
                    // Drawing helper from MediaPipe
                    drawConnectors(ctx, landmarks, HAND_CONNECTIONS, { color: 'rgba(0, 242, 255, 0.8)', lineWidth: 2 });
                    drawLandmarks(ctx, landmarks, { color: 'rgba(255, 255, 255, 1)', radius: 3 });
                }

                // --- Pinch to Zoom Logic ---
                if (results.multiHandLandmarks.length >= 2) {
                    const hand1 = results.multiHandLandmarks[0];
                    const hand2 = results.multiHandLandmarks[1];

                    // Use thumb and index finger tips for pinch detection
                    const thumbTip1 = hand1[4];
                    const indexTip1 = hand1[8];
                    const thumbTip2 = hand2[4];
                    const indexTip2 = hand2[8];

                    // Calculate distance between closest points of two hands (e.g., index finger tips)
                    const dist1 = Math.hypot(indexTip1.x * videoWidth - indexTip2.x * videoWidth, indexTip1.y * videoHeight - indexTip2.y * videoHeight);
                    const dist2 = Math.hypot(thumbTip1.x * videoWidth - thumbTip2.x * videoWidth, thumbTip1.y * videoHeight - thumbTip2.y * videoHeight);

                    const currentDistance = Math.min(dist1, dist2); // Use the closer distance as a more sensitive indicator

                    if (!activePinch) {
                        pinchStartDistance = currentDistance;
                        pinchStartZoom = cameraControls.zoom;
                        activePinch = true;
                    } else {
                        const deltaDistance = currentDistance - pinchStartDistance;
                        const zoomFactor = deltaDistance / 200; // Adjust this divisor for sensitivity
                        cameraControls.zoom = pinchStartZoom - zoomFactor; // Subtracting because larger distance means zooming out
                        cameraControls.zoom = Math.max(0.5, Math.min(5, cameraControls.zoom)); // Clamp zoom level
                    }
                } else {
                    activePinch = false; // Reset pinch if less than 2 hands detected
                    pinchStartDistance = null;
                }

                // --- 3D Earth Interaction ---
                if (results.multiHandLandmarks.length > 0) {
                    const hand = results.multiHandLandmarks[0]; // Use the first detected hand for movement

                    // Get landmarks for wrist and palm base for relative movement
                    const wrist = hand[0]; // Wrist is usually at index 0
                    const baseOfPalm = hand[1]; // Base of palm is often at index 1

                    // Scale hand movement to influence 3D world movement
                    // We want to map a portion of the screen's width/height to the camera's movement
                    // Consider the center of the screen as the origin (0,0)
                    const normalizedX = (wrist.x - 0.5) * 2; // -1 to 1 range
                    const normalizedY = (wrist.y - 0.5) * -2; // -1 to 1 range (inverted for screen coords)

                    // Adjust sensitivity of hand movement to earth movement
                    const movementSensitivity = 1.5;
                    const targetX = normalizedX * movementSensitivity;
                    const targetY = normalizedY * movementSensitivity;

                    // Smoothly interpolate the Earth's position (or camera's target)
                    // For now, we'll move the earth mesh directly
                    earthMesh.position.x = targetX;
                    earthMesh.position.y = targetY;
                } else {
                    // If no hands are detected, gently return earth to center
                    earthMesh.position.x = THREE.MathUtils.lerp(earthMesh.position.x, 0, 0.1);
                    earthMesh.position.y = THREE.MathUtils.lerp(earthMesh.position.y, 0, 0.1);
                }

            } else {
                lastHandLandmarks = null;
                activePinch = false; // Reset pinch if no hands
                pinchStartDistance = null;

                // Gently return earth to center if no hands detected
                earthMesh.position.x = THREE.MathUtils.lerp(earthMesh.position.x, 0, 0.1);
                earthMesh.position.y = THREE.MathUtils.lerp(earthMesh.position.y, 0, 0.1);
            }

            ctx.restore();
        }

        // --- Initialization ---
        // Start webcam first to handle permissions
        startWebcam();
        // Initialize Three.js after a short delay to ensure DOM elements are ready
        // and to give webcam a chance to initialize without immediately blocking
        setTimeout(initThreeJS, 100);


        // Add event listener for window resize
        window.addEventListener('resize', onWindowResize);

    </script>
</body>
</html>
