<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Salonicas Vision OS | Stable</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;600&display=swap');

  :root {
    --cyan: #00f2ff;
    --dark: #020408;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body, html { 
    width: 100%; height: 100%; overflow: hidden; 
    background: #000; font-family: 'Rajdhani', sans-serif;
    color: var(--cyan);
  }

  #loading-screen {
    position: fixed; inset: 0; z-index: 999;
    background: var(--dark); display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    transition: opacity 0.5s;
  }

  #app { display: flex; flex-direction: column; height: 100vh; width: 100vw; }

  #top-section { height: 60%; width: 100%; position: relative; background: #000; }
  #bottom-section { 
    height: 40%; width: 100%; position: relative; 
    border-top: 2px solid var(--cyan); background: #000;
  }

  video, canvas { position: absolute; inset: 0; width: 100%; height: 100%; }
  #webcam { transform: scaleX(-1); object-fit: cover; opacity: 0.5; }
  #hand-canvas { transform: scaleX(-1); z-index: 5; }

  .hud {
    position: absolute; z-index: 10; pointer-events: none;
    font-family: 'Orbitron', sans-serif; font-size: 10px;
    text-shadow: 0 0 10px var(--cyan);
  }
  .tl { top: 15px; left: 15px; }
  .tr { top: 15px; right: 15px; text-align: right; }
  .br { bottom: 15px; right: 15px; display: flex; align-items: center; gap: 8px; }

  #start-overlay {
    position: fixed; inset: 0; z-index: 1000;
    background: rgba(0,0,0,0.8); display: flex;
    align-items: center; justify-content: center;
  }
  
  button {
    padding: 15px 40px; background: transparent; border: 2px solid var(--cyan);
    color: var(--cyan); font-family: 'Orbitron'; cursor: pointer;
    box-shadow: 0 0 15px var(--cyan);
  }
</style>
</head>
<body>

<div id="start-overlay">
  <button onclick="initSystem()">INITIALIZE SYSTEM</button>
</div>

<div id="loading-screen" style="display:none">
  <div style="letter-spacing: 5px; font-size: 20px;">LOADING VISION OS...</div>
</div>

<div id="app">
  <div id="top-section">
    <canvas id="three-canvas"></canvas>
    <div class="hud tl">EARTH_CORE // SPATIAL</div>
    <div class="hud tr" id="coords">X: 0.00 Y: 0.00</div>
  </div>

  <div id="bottom-section">
    <video id="webcam" playsinline></video>
    <canvas id="hand-canvas"></canvas>
    <div class="hud tl">SENSOR_FEED // ACTIVE</div>
    <div class="hud br">
      <div style="text-align: right">
        <div style="font-weight: bold;">SALONICAS</div>
        <div style="font-size: 8px;">VISION OS</div>
      </div>
      <div style="width:25px; height:15px; border:1px solid white; background: linear-gradient(to bottom, #005bae 20%, #fff 20%, #fff 40%, #005bae 40%, #005bae 60%, #fff 60%, #fff 80%, #005bae 80%);"></div>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>

<script>
let scene, camera, renderer, earth;
let state = { targetX: 0, targetY: 0, currX: 0, currY: 0, zoom: 4 };

function initThree() {
  scene = new THREE.Scene();
  camera = new THREE.PerspectiveCamera(50, window.innerWidth / (window.innerHeight * 0.6), 0.1, 1000);
  renderer = new THREE.WebGLRenderer({ canvas: document.getElementById(«three-canvas»), antialias: true, alpha: true });
  renderer.setSize(window.innerWidth, window.innerHeight * 0.6);

  const light = new THREE.DirectionalLight(0xffffff, 1.5);
  light.position.set(5, 3, 5);
  scene.add(light);
  scene.add(new THREE.AmbientLight(0x404040));

  const geo = new THREE.SphereGeometry(1.5, 64, 64);
  const mat = new THREE.MeshPhongMaterial({
    color: 0x00f2ff,
    emissive: 0x002233,
    wireframe: true, // Πιο high-tech aesthetic
  });
  earth = new THREE.Mesh(geo, mat);
  scene.add(earth);
  camera.position.z = 4;
}

function onResults(results) {
  const canvas = document.getElementById(«hand-canvas»);
  const ctx = canvas.getContext(«2d»);
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
    for (const landmarks of results.multiHandLandmarks) {
      // Σχεδίαση με το επίσημο tool της MediaPipe για ταχύτητα
      drawConnectors(ctx, landmarks, HAND_CONNECTIONS, {color: «#00f2ff», lineWidth: 2});
      drawLandmarks(ctx, landmarks, {color: «#ffffff», lineWidth: 1, radius: 2});

      // Κίνηση (Lerp target)
      state.targetX = (landmarks[0].x - 0.5) * 5;
      state.targetY = -(landmarks[0].y - 0.5) * 3;
    }
  }
}

async function initSystem() {
  document.getElementById(«start-overlay»).style.display = «none»;
  document.getElementById(«loading-screen»).style.display = «flex»;
  
  initThree();

  const video = document.getElementById(«webcam»);
  const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
  hands.setOptions({maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5});
  hands.onResults(onResults);

  const cam = new Camera(video, {
    onFrame: async () => {
      await hands.send({image: video});
    },
    width: 1280,
    height: 720
  });

  cam.start().then(() => {
    document.getElementById(«loading-screen»).style.display = «none»;
    animate();
  });
}

function animate() {
  requestAnimationFrame(animate);
  
  // Smoothing Logic (Lerp)
  state.currX += (state.targetX - state.currX) * 0.1;
  state.currY += (state.targetY - state.currY) * 0.1;
  
  earth.position.x = state.currX;
  earth.position.y = state.currY;
  earth.rotation.y += 0.01;

  document.getElementById(«coords»).innerText = `X: ${state.currX.toFixed(2)} Y: ${state.currY.toFixed(2)}`;
  renderer.render(scene, camera);
}

window.addEventListener(«resize», () => {
  camera.aspect = window.innerWidth / (window.innerHeight * 0.6);
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight * 0.6);
});
</script>
</body>
</html>
