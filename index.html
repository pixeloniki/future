<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <title>Salonicas Vision OS</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
        
        /* Η Κάμερα καταλαμβάνει όλο το φόντο */
        #video_input {
            position: fixed;
            width: 100vw;
            height: 100vh;
            object-fit: cover;
            transform: scaleX(-1);
            filter: brightness(0.5) contrast(1.2);
        }

        /* Το Layer των αισθητήρων και της Γης */
        #overlay_canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 5;
            transform: scaleX(-1);
        }

        #three_canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 10;
            pointer-events: none;
        }

        /* Φουτουριστικό UI Salonicas */
        #ui {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 20;
            pointer-events: none;
            color: #00f2ff;
            text-shadow: 0 0 15px #00f2ff;
        }

        .header { position: absolute; top: 30px; left: 40px; border-left: 3px solid #00f2ff; padding-left: 15px; }
        .footer { position: absolute; bottom: 40px; right: 40px; text-align: right; }
        .footer h1 { font-size: 3rem; margin: 0; color: #fff; letter-spacing: 5px; }
        .flag { width: 50px; border: 1px solid #fff; margin-top: 10px; }
        
        .gesture-indicator {
            position: absolute;
            top: 30px;
            right: 40px;
            padding: 10px 20px;
            background: rgba(0, 242, 255, 0.1);
            border: 1px solid #00f2ff;
            border-radius: 50px;
        }
    </style>
</head>
<body>

<video id="video_input"></video>
<canvas id="overlay_canvas"></canvas>
<div id="three_canvas"></div>

<div id="ui">
    <div class="header">
        ΣΥΣΤΗΜΑ : SALONICAS v5.0<br>
        ΑΙΣΘΗΤΗΡΕΣ : ΕΝΕΡΓΟΙ (120Hz)<br>
        ΠΡΩΤΟΚΟΛΛΟ : VISION PRO
    </div>
    
    <div id="gesture_box" class="gesture-indicator">ΑΝΑΜΟΝΗ ΧΕΙΡΟΝΟΜΙΑΣ</div>

    <div class="footer">
        <p>ADVANCED INTERFACE BY</p>
        <h1>SALONICAS</h1>
        <img src="https://upload.wikimedia.org/wikipedia/commons/5/5c/Flag_of_Greece.svg" class="flag">
    </div>
</div>

<script>
    const video = document.getElementById('video_input');
    const canvas = document.getElementById('overlay_canvas');
    const ctx = canvas.getContext('2d');
    const gestureBox = document.getElementById('gesture_box');

    // --- THREE.JS SETUP ---
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.getElementById('three_canvas').appendChild(renderer.domElement);

    const light = new THREE.DirectionalLight(0xffffff, 1.2);
    light.position.set(5, 5, 5);
    scene.add(light);
    scene.add(new THREE.AmbientLight(0x404040));

    const earthGeom = new THREE.SphereGeometry(2, 64, 64);
    const earthTex = new THREE.TextureLoader().load('https://raw.githubusercontent.com/mrdoob/three.js/master/examples/textures/planets/earth_atmos_2048.jpg');
    const earthMat = new THREE.MeshPhongMaterial({ map: earthTex, shininess: 10 });
    const earth = new THREE.Mesh(earthGeom, earthMat);
    scene.add(earth);
    camera.position.z = 6;

    // --- MEDIAPIPE SETUP ---
    const hands = new Hands({locateFile: (file) => {
        return `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`;
    }});

    hands.setOptions({
        maxNumHands: 1,
        modelComplexity: 1,
        minDetectionConfidence: 0.8,
        minTrackingConfidence: 0.8
    });

    hands.onResults((results) => {
        // Προσαρμογή canvas στην οθόνη
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
            const landmarks = results.multiHandLandmarks[0];

            // 1. Σχεδίαση των αισθητήρων πάνω στα δάχτυλα (Live)
            drawConnectors(ctx, landmarks, HAND_CONNECTIONS, {color: '#00f2ff', lineWidth: 4});
            drawLandmarks(ctx, landmarks, {color: '#ffffff', lineWidth: 1, radius: 5});

            // 2. Λογική ελέγχου (Pinch Gesture)
            const thumb = landmarks[4];
            const index = landmarks[8];
            const distance = Math.sqrt(Math.pow(thumb.x - index.x, 2) + Math.pow(thumb.y - index.y, 2));

            if (distance < 0.05) {
                gestureBox.innerText = «ΕΝΕΡΓΗ ΠΕΡΙΣΤΡΟΦΗ»;
                gestureBox.style.background = «rgba(0, 242, 255, 0.4)»;
                // Η Γη γυρνάει όταν "πιάνεις" τον αέρα
                earth.rotation.y += 0.1;
                earth.scale.set(1.1, 1.1, 1.1); // Μικρό οπτικό feedback
            } else {
                gestureBox.innerText = «ΑΝΑΖΗΤΗΣΗ ΧΕΙΡΟΝΟΜΙΑΣ»;
                gestureBox.style.background = «rgba(0, 242, 255, 0.1)»;
                earth.scale.set(1, 1, 1);
            }

            // 3. Η Γη ακολουθεί το χέρι με ομαλότητα (Smooth Follow)
            const targetX = (landmarks[9].x - 0.5) * -12;
            const targetY = (landmarks[9].y - 0.5) * -8;
            earth.position.x += (targetX - earth.position.x) * 0.1;
            earth.position.y += (targetY - earth.position.y) * 0.1;
        }
    });

    const cam = new Camera(video, {
        onFrame: async () => {
            await hands.send({image: video});
        },
        width: 1280,
        height: 720
    });
    cam.start();

    function animate() {
        requestAnimationFrame(animate);
        earth.rotation.y += 0.002; // Αργή περιστροφή βάθους
        renderer.render(scene, camera);
    }

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });

    animate();
</script>
</body>
</html>
