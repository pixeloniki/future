<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <title>Salonicas Future OS</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; background: #000; overflow: hidden; font-family: sans-serif; }
        #app-container { display: flex; flex-direction: column; height: 100vh; }
        
        /* Πάνω: Η Γη */
        #space-top { flex: 1.2; position: relative; background: #000; }
        
        /* Κάτω: Η Κάμερα */
        #camera-bottom { flex: 1; position: relative; border-top: 2px solid #00f2ff; background: #050505; }

        #webcam_vid { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
        #sensor_layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; transform: scaleX(-1); pointer-events: none; }

        .os-text { position: absolute; top: 10px; left: 15px; color: #00f2ff; font-size: 0.7rem; font-family: monospace; }
        .salonicas-sign { position: absolute; bottom: 15px; right: 20px; text-align: right; }
        .salonicas-sign h1 { color: #fff; margin: 0; font-size: 1.4rem; text-shadow: 0 0 10px #00f2ff; }
        
        /* Loader */
        #splash { position: fixed; inset: 0; background: #000; color: #00f2ff; display: flex; justify-content: center; align-items: center; z-index: 999; }
    </style>
</head>
<body>

<div id="splash">ΕΚΚΙΝΗΣΗ ΣΥΣΤΗΜΑΤΟΣ SALONICAS...</div>

<div id="app-container">
    <div id="space-top">
        <div class="os-text">LIVE SPACE FEED v9.0</div>
    </div>
    <div id="camera-bottom">
        <video id="webcam_vid" playsinline></video>
        <canvas id="sensor_layer"></canvas>
        <div class="salonicas-sign">
            <h1>SALONICAS</h1>
            <p style="color:#00f2ff; font-size: 10px; margin:0;">NEURAL INTERFACE</p>
        </div>
    </div>
</div>

<script>
    const video = document.getElementById(«webcam_vid»);
    const canvas = document.getElementById(«sensor_layer»);
    const ctx = canvas.getContext(«2d»);
    const splash = document.getElementById(«splash»);

    // --- 3D EARTH ---
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / (window.innerHeight * 0.5), 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight * 0.55);
    document.getElementById(«space-top»).appendChild(renderer.domElement);

    const earthGeo = new THREE.SphereGeometry(2.2, 64, 64);
    const earthTex = new THREE.TextureLoader().load(«https://raw.githubusercontent.com/mrdoob/three.js/master/examples/textures/planets/earth_atmos_2048.jpg»);
    const earthMat = new THREE.MeshPhongMaterial({ map: earthTex });
    const earth = new THREE.Mesh(earthGeo, earthMat);
    scene.add(earth);

    const sun = new THREE.PointLight(0xffffff, 1.4);
    sun.position.set(5, 5, 5);
    scene.add(sun);
    scene.add(new THREE.AmbientLight(0x222222));
    camera.position.z = 6;

    // --- SENSORS & GESTURES ---
    let startPinch = null;
    let baseZ = 6;

    function handleResults(results) {
        splash.style.display = «none»;
        canvas.width = video.clientWidth;
        canvas.height = video.clientHeight;
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        if (results.multiHandLandmarks) {
            for (const hand of results.multiHandLandmarks) {
                // Σχεδίαση αισθητήρων με απλό και γρήγορο τρόπο
                ctx.fillStyle = «#00f2ff»;
                for (let i = 0; i < hand.length; i++) {
                    const x = hand[i].x * canvas.width;
                    const y = hand[i].y * canvas.height;
                    ctx.beginPath();
                    ctx.arc(x, y, 4, 0, 2 * Math.PI);
                    ctx.fill();
                    // Γραμμές σύνδεσης
                    if (i > 0) {
                        ctx.strokeStyle = «rgba(0, 242, 255, 0.4)»;
                        ctx.lineWidth = 2;
                        ctx.beginPath();
                        ctx.moveTo(hand[i-1].x * canvas.width, hand[i-1].y * canvas.height);
                        ctx.lineTo(x, y);
                        ctx.stroke();
                    }
                }

                // Έλεγχος Γης
                const palm = hand[9];
                earth.position.x = (palm.x - 0.5) * -12;
                earth.position.y = (palm.y - 0.5) * -8;
                earth.rotation.y += 0.01;
            }

            // Pinch-to-zoom logic
            if (results.multiHandLandmarks.length === 2) {
                const h1 = results.multiHandLandmarks[0][9];
                const h2 = results.multiHandLandmarks[1][9];
                const d = Math.sqrt(Math.pow(h1.x - h2.x, 2) + Math.pow(h1.y - h2.y, 2));
                if (!startPinch) startPinch = d;
                else {
                    camera.position.z = Math.max(3, Math.min(10, baseZ * (startPinch / d)));
                }
            } else {
                startPinch = null;
                baseZ = camera.position.z;
            }
        }
    }

    // --- STARTUP ---
    const handTracker = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
    handTracker.setOptions({ maxNumHands: 2, modelComplexity: 1, minDetectionConfidence: 0.5 });
    handTracker.onResults(handleResults);

    async function activate() {
        const stream = await navigator.mediaDevices.getUserMedia({ video: true });
        video.srcObject = stream;
        video.play();
        const cam = new Camera(video, {
            onFrame: async () => { await handTracker.send({image: video}); },
            width: 1280, height: 720
        });
        cam.start();
    }

    activate().catch(() => {
        splash.innerHTML = «<p style='color:red'>ΣΦΑΛΜΑ: ΔΩΣΤΕ ΑΔΕΙΑ ΣΤΗΝ ΚΑΜΕΡΑ ΚΑΙ ΚΑΝΤΕ REFRESH</p>»;
    });

    function draw() { requestAnimationFrame(draw); renderer.render(scene, camera); }
    draw();
</script>
</body>
</html>
