<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <title>Salonicas Sensor Vision</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Segoe UI', sans-serif; color: #00d2ff; }
        
        /* Η κύρια κάμερα στο υπόβαθρο */
        #webcam { transform: scaleX(-1); position: fixed; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; opacity: 0.3; z-index: 0; filter: brightness(0.5) contrast(1.2) sepia(0.5) hue-rotate(140deg); }
        
        /* Το επίπεδο των αισθητήρων */
        #sensor-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; transform: scaleX(-1); }
        
        /* Το 3D περιβάλλον */
        #canvas-3d { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 2; pointer-events: none; }

        /* Φουτουριστικό UI */
        #ui { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; pointer-events: none; border: 20px solid rgba(0, 210, 255, 0.1); box-sizing: border-box; }
        .top-info { position: absolute; top: 40px; left: 60px; font-family: monospace; font-size: 1.2rem; text-shadow: 0 0 10px #00d2ff; }
        .brand { position: absolute; bottom: 50px; right: 60px; text-align: right; }
        .brand h1 { font-size: 2.5rem; margin: 0; letter-spacing: 4px; text-shadow: 0 0 20px #00d2ff; }
        .flag { width: 50px; margin-top: 10px; opacity: 0.8; }
    </style>
</head>
<body>

<video id="webcam" autoplay playsinline></video>
<canvas id="sensor-canvas"></canvas>
<div id="canvas-3d"></div>

<div id="ui">
    <div class="top-info">
        LIVE SENSOR FEED: ACTIVE<br>
        PROCESSED BY SALONICAS AI v3.0<br>
        ΕΛΛΗΝΙΚΟ ΣΥΣΤΗΜΑ ΕΛΕΓΧΟΥ
    </div>
    <div class="brand">
        <h1>CREATED BY SALONICAS</h1>
        <img src="https://upload.wikimedia.org/wikipedia/commons/5/5c/Flag_of_Greece.svg" class="flag">
    </div>
</div>

<script type="module">
    import { GestureRecognizer, FilesetResolver, DrawingUtils } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3";

    const video = document.getElementById("webcam");
    const canvasElement = document.getElementById("sensor-canvas");
    const canvasCtx = canvasElement.getContext("2d");
    let gestureRecognizer;

    // --- THREE.JS SETUP (Η ΓΗ) ---
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.getElementById('canvas-3d').appendChild(renderer.domElement);

    const light = new THREE.PointLight(0xffffff, 1.5);
    light.position.set(5, 5, 5);
    scene.add(light);
    scene.add(new THREE.AmbientLight(0x202020));

    const earthGeom = new THREE.SphereGeometry(1.5, 64, 64);
    const earthTex = new THREE.TextureLoader().load('https://raw.githubusercontent.com/mrdoob/three.js/master/examples/textures/planets/earth_atmos_2048.jpg');
    const earthMat = new THREE.MeshPhongMaterial({ map: earthTex });
    const earth = new THREE.Mesh(earthGeom, earthMat);
    scene.add(earth);
    camera.position.z = 5;

    // --- AI & SENSORS ---
    async function init() {
        const vision = await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/wasm");
        gestureRecognizer = await GestureRecognizer.createFromOptions(vision, {
            baseOptions: { modelAssetPath: "https://storage.googleapis.com/mediapipe-models/gesture_recognizer/gesture_recognizer/float16/1/gesture_recognizer.task", delegate: "GPU" },
            runningMode: "VIDEO"
        });
        startCamera();
    }

    function startCamera() {
        navigator.mediaDevices.getUserMedia({ video: { width: 1280, height: 720 } }).then((stream) => {
            video.srcObject = stream;
            video.addEventListener("loadeddata", predict);
        });
    }

    let lastTime = -1;
    const drawingUtils = new DrawingUtils(canvasCtx);

    async function predict() {
        canvasElement.width = video.videoWidth;
        canvasElement.height = video.videoHeight;

        if (video.currentTime !== lastTime) {
            lastTime = video.currentTime;
            const results = gestureRecognizer.recognizeForVideo(video, Date.now());

            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);

            if (results.landmarks) {
                for (const landmarks of results.landmarks) {
                    // Σχεδίαση των συνδέσμων (γραμμές)
                    drawingUtils.drawConnectors(landmarks, GestureRecognizer.HAND_CONNECTIONS, {
                        color: "#00d2ff",
                        lineWidth: 4
                    });
                    // Σχεδίαση των αισθητήρων (τελεία σε κάθε άρθρωση)
                    drawingUtils.drawLandmarks(landmarks, {
                        color: "#ffffff",
                        lineWidth: 2,
                        radius: 5
                    });

                    // Αλληλεπίδραση με τη Γη
                    const palm = landmarks[9];
                    earth.position.x = (palm.x - 0.5) * -10;
                    earth.position.y = (palm.y - 0.5) * -10;
                    
                    // Zoom In/Out βάσει ύψους
                    camera.position.z = 4 + (palm.y * 3);
                }
            }
        }
        earth.rotation.y += 0.005;
        renderer.render(scene, camera);
        requestAnimationFrame(predict);
    }

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });

    init();
</script>
</body>
</html>
