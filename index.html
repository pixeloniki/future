<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <title>Salonicas Vision OS v7.0</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; background: #000; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
        
        #main-container { display: flex; flex-direction: column; height: 100vh; }

        /* Πάνω μέρος: Η Γη (Space) */
        #space-window { flex: 1.5; position: relative; background: radial-gradient(circle, #001d3d 0%, #000 100%); border-bottom: 3px solid #00f2ff; }
        
        /* Κάτω μέρος: Η Κάμερα (Sensors) */
        #camera-window { flex: 1; position: relative; background: #050505; display: flex; justify-content: center; }

        #video_in { height: 100%; width: auto; transform: scaleX(-1); display: none; }
        #sensor_out { height: 100%; width: auto; transform: scaleX(-1); z-index: 5; }

        /* Branding & UI */
        .salonicas-header { position: absolute; top: 20px; left: 20px; color: #00f2ff; font-weight: bold; letter-spacing: 2px; text-shadow: 0 0 10px #00f2ff; }
        .salonicas-brand { position: absolute; bottom: 20px; right: 20px; text-align: right; }
        .salonicas-brand h1 { color: #fff; margin: 0; font-size: 1.8rem; text-shadow: 0 0 15px #00f2ff; }
        .gr-flag { width: 35px; border: 1px solid white; margin-top: 5px; }
        
        #loader { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; color: #00f2ff; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 1000; }
        .spinner { width: 50px; height: 50px; border: 5px solid rgba(0,242,255,0.1); border-top: 5px solid #00f2ff; border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div id="loader">
    <div class="spinner"></div>
    <p>ΣΥΣΤΗΜΑ SALONICAS: ΕΚΚΙΝΗΣΗ ΑΙΣΘΗΤΗΡΩΝ...</p>
</div>

<div id="main-container">
    <div id="space-window">
        <div class="salonicas-header">SPACE VIEW PROTOCOL</div>
    </div>
    
    <div id="camera-window">
        <video id="video_in" playsinline></video>
        <canvas id="sensor_out"></canvas>
        <div class="salonicas-brand">
            <h1>CREATED BY SALONICAS</h1>
            <img src="https://upload.wikimedia.org/wikipedia/commons/5/5c/Flag_of_Greece.svg" class="gr-flag">
        </div>
    </div>
</div>

<script>
    const video = document.getElementById(«video_in»);
    const canvas = document.getElementById(«sensor_out»);
    const ctx = canvas.getContext(«2d»);
    const loader = document.getElementById(«loader»);

    // --- 3D EARTH SETUP ---
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / (window.innerHeight * 0.6), 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight * 0.6);
    document.getElementById(«space-window»).appendChild(renderer.domElement);

    const earthGeo = new THREE.SphereGeometry(2, 64, 64);
    const earthMap = new THREE.TextureLoader().load(«https://raw.githubusercontent.com/mrdoob/three.js/master/examples/textures/planets/earth_atmos_2048.jpg»);
    const earthMat = new THREE.MeshPhongMaterial({ map: earthMap });
    const earth = new THREE.Mesh(earthGeo, earthMat);
    scene.add(earth);

    const light = new THREE.DirectionalLight(0xffffff, 1.5);
    light.position.set(5, 3, 5);
    scene.add(light);
    scene.add(new THREE.AmbientLight(0x222222));
    camera.position.z = 5;

    // --- SENSORS LOGIC ---
    let initialZoomDist = null;
    let baseZoom = 5;

    function onHandResults(results) {
        loader.style.display = «none»;
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        
        ctx.save();
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        if (results.multiHandLandmarks) {
            for (const landmarks of results.multiHandLandmarks) {
                // Σχεδίαση Αισθητήρων στα δάχτυλα
                drawConnectors(ctx, landmarks, HAND_CONNECTIONS, {color: «#00f2ff», lineWidth: 4});
                drawLandmarks(ctx, landmarks, {color: «#ffffff», lineWidth: 1, radius: 5});

                // Κίνηση Γης Πάνω-Κάτω-Δεξιά-Αριστερά
                const point = landmarks[9]; // Middle palm
                earth.position.x = (point.x - 0.5) * -10;
                earth.position.y = (point.y - 0.5) * -8;
                earth.rotation.y += 0.01;
            }

            // Pinch Zoom (Δύο χέρια)
            if (results.multiHandLandmarks.length === 2) {
                const p1 = results.multiHandLandmarks[0][9];
                const p2 = results.multiHandLandmarks[1][9];
                const dist = Math.sqrt(Math.pow(p1.x - p2.x, 2) + Math.pow(p1.y - p2.y, 2));

                if (initialZoomDist === null) {
                    initialZoomDist = dist;
                } else {
                    let factor = initialZoomDist / dist;
                    camera.position.z = Math.max(2.5, Math.min(10, baseZoom * factor));
                }
            } else {
                initialZoomDist = null;
                baseZoom = camera.position.z;
            }
        }
        ctx.restore();
    }

    // --- INITIALIZATION ---
    const hands = new Hands({locateFile: (file) => {
        return `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`;
    }});

    hands.setOptions({
        maxNumHands: 2,
        modelComplexity: 1,
        minDetectionConfidence: 0.5,
        minTrackingConfidence: 0.5
    });
    hands.onResults(onHandResults);

    const cam = new Camera(video, {
        onFrame: async () => {
            await hands.send({image: video});
        },
        width: 1280,
        height: 720
    });

    cam.start().catch(() => {
        loader.innerHTML = «<p style='color:red'>ΣΦΑΛΜΑ: ΠΑΡΑΚΑΛΩ ΕΠΙΤΡΕΨΤΕ ΤΗΝ ΚΑΜΕΡΑ</p>»;
    });

    function renderLoop() {
        requestAnimationFrame(renderLoop);
        renderer.render(scene, camera);
    }
    renderLoop();

    window.addEventListener(«resize», () => {
        renderer.setSize(window.innerWidth, window.innerHeight * 0.6);
        camera.aspect = window.innerWidth / (window.innerHeight * 0.6);
        camera.updateProjectionMatrix();
    });
</script>
</body>
</html>
