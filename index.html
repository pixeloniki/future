<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <title>Salonicas Space OS v8.0</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; background: #000; overflow: hidden; font-family: sans-serif; }
        #wrapper { display: flex; flex-direction: column; height: 100vh; }
        
        /* Πάνω: Η Γη */
        #top-zone { flex: 1.2; position: relative; border-bottom: 2px solid #00f2ff; }
        
        /* Κάτω: Η Κάμερα */
        #bottom-zone { flex: 1; position: relative; background: #050505; overflow: hidden; }

        #video_raw { position: absolute; width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); opacity: 0.4; }
        #sensor_canvas { position: absolute; width: 100%; height: 100%; transform: scaleX(-1); z-index: 10; }

        .ui-label { position: absolute; top: 15px; left: 20px; color: #00f2ff; font-family: monospace; z-index: 20; }
        .salonicas-footer { position: absolute; bottom: 20px; right: 25px; text-align: right; z-index: 30; }
        .salonicas-footer h1 { color: #fff; margin: 0; font-size: 1.8rem; text-shadow: 0 0 15px #00f2ff; letter-spacing: 3px; }
        .flag { width: 35px; border: 1px solid white; margin-top: 5px; }

        #boot-screen { position: fixed; inset: 0; background: #000; color: #00f2ff; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; }
        .loader-ring { width: 40px; height: 40px; border: 3px solid rgba(0,242,255,0.2); border-top-color: #00f2ff; border-radius: 50%; animation: rot 1s infinite linear; margin-bottom: 15px; }
        @keyframes rot { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div id="boot-screen">
    <div class="loader-ring"></div>
    <p>ΑΝΑΜΟΝΗ ΓΙΑ ΑΔΕΙΑ ΚΑΜΕΡΑΣ...</p>
</div>

<div id="wrapper">
    <div id="top-zone">
        <div class="ui-label">ΠΕΡΙΒΑΛΛΟΝ ΔΙΑΣΤΗΜΑΤΟΣ</div>
    </div>
    <div id="bottom-zone">
        <video id="video_raw" playsinline></video>
        <canvas id="sensor_canvas"></canvas>
        <div class="salonicas-footer">
            <h1>CREATED BY SALONICAS</h1>
            <img src="https://upload.wikimedia.org/wikipedia/commons/5/5c/Flag_of_Greece.svg" class="flag">
        </div>
    </div>
</div>

<script>
    const video = document.getElementById(«video_raw»);
    const canvas = document.getElementById(«sensor_canvas»);
    const ctx = canvas.getContext(«2d»);
    const boot = document.getElementById(«boot-screen»);

    // --- 3D SPACE ---
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / (window.innerHeight * 0.5), 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight * 0.55);
    document.getElementById(«top-zone»).appendChild(renderer.domElement);

    const earthGeo = new THREE.SphereGeometry(2, 64, 64);
    const earthTex = new THREE.TextureLoader().load(«https://raw.githubusercontent.com/mrdoob/three.js/master/examples/textures/planets/earth_atmos_2048.jpg»);
    const earthMat = new THREE.MeshPhongMaterial({ map: earthTex });
    const earth = new THREE.Mesh(earthGeo, earthMat);
    scene.add(earth);

    const light = new THREE.PointLight(0xffffff, 1.5);
    light.position.set(10, 10, 10);
    scene.add(light);
    scene.add(new THREE.AmbientLight(0x222222));
    camera.position.z = 5;

    // --- SENSORS & ZOOM LOGIC ---
    let initialPinch = null;
    let zoomLevel = 5;

    function onResults(results) {
        boot.style.display = «none»;
        canvas.width = video.clientWidth;
        canvas.height = video.clientHeight;
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        if (results.multiHandLandmarks) {
            for (const hand of results.multiHandLandmarks) {
                // Σχεδίαση Αισθητήρων
                drawConnectors(ctx, hand, HAND_CONNECTIONS, {color: «#00f2ff», lineWidth: 4});
                drawLandmarks(ctx, hand, {color: «#ffffff», lineWidth: 1, radius: 5});

                // Κίνηση Γης (Πάνω-Κάτω, Δεξιά-Αριστερά)
                const palm = hand[9];
                earth.position.x = (palm.x - 0.5) * -12;
                earth.position.y = (palm.y - 0.5) * -8;
                earth.rotation.y += 0.01;
            }

            // Pinch Zoom (Όπως στο κινητό)
            if (results.multiHandLandmarks.length === 2) {
                const h1 = results.multiHandLandmarks[0][9];
                const h2 = results.multiHandLandmarks[1][9];
                const d = Math.sqrt(Math.pow(h1.x - h2.x, 2) + Math.pow(h1.y - h2.y, 2));
                if (!initialPinch) initialPinch = d;
                else {
                    camera.position.z = Math.max(3, Math.min(10, zoomLevel * (initialPinch / d)));
                }
            } else {
                initialPinch = null;
                zoomLevel = camera.position.z;
            }
        }
    }

    // --- START SYSTEM ---
    const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
    hands.setOptions({ maxNumHands: 2, modelComplexity: 1, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5 });
    hands.onResults(onResults);

    // Force Camera Permission
    async function startApp() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: { width: 1280, height: 720 } });
            video.srcObject = stream;
            video.play();
            const cameraInit = new Camera(video, {
                onFrame: async () => { await hands.send({image: video}); },
                width: 1280, height: 720
            });
            cameraInit.start();
        } catch (err) {
            boot.innerHTML = «<p style='color:red'>ΠΑΡΑΚΑΛΩ ΕΠΙΤΡΕΨΤΕ ΤΗΝ ΚΑΜΕΡΑ ΚΑΙ ΑΝΑΝΕΩΣΤΕ</p>»;
        }
    }

    startApp();
    function loop() { requestAnimationFrame(loop); renderer.render(scene, camera); }
    loop();
</script>
</body>
</html>
