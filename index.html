<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Salonicas Vision OS</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            font-family: -apple-system, BlinkMacSystemFont, «Segoe UI», Roboto, sans-serif;
        }

        #loading-screen {
            position: fixed;
            inset: 0;
            z-index: 100;
            background: radial-gradient(circle at center, #001a1d 0%, #000 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #00f2ff;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(0, 242, 255, 0.1);
            border-top: 3px solid #00f2ff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }

        .container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            width: 100vw;
        }

        #top-section {
            height: 60%;
            width: 100%;
            background: #000;
            position: relative;
        }

        #bottom-section {
            height: 40%;
            width: 100%;
            position: relative;
            background: #050505;
            border-top: 2px solid #00f2ff;
            overflow: hidden;
        }

        #webcam-video {
            transform: scaleX(-1);
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: none;
        }

        #overlay-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            transform: scaleX(-1);
        }

        .branding {
            position: absolute;
            bottom: 15px;
            right: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(0, 0, 0, 0.6);
            padding: 8px 12px;
            border-radius: 20px;
            border: 1px solid rgba(0, 242, 255, 0.3);
            backdrop-filter: blur(10px);
            z-index: 10;
        }

        .branding span {
            color: #00f2ff;
            font-size: 12px;
            letter-spacing: 2px;
            font-weight: 800;
        }

        .greek-flag {
            width: 20px;
            height: 14px;
            background: linear-gradient(to bottom, #005bae 20%, #fff 20%, #fff 40%, #005bae 40%, #005bae 60%, #fff 60%, #fff 80%, #005bae 80%);
            position: relative;
        }
    </style>
</head>
<body>

    <div id="loading-screen">
        <div class="spinner"></div>
        <p id="status-text">INITIALIZING VISION OS...</p>
        <button id="start-btn" style="display:none; padding:10px 30px; background:#00f2ff; border:none; border-radius:5px; cursor:pointer; font-weight:bold;">START SYSTEM</button>
    </div>

    <div class="container">
        <div id="top-section"></div>
        <div id="bottom-section">
            <video id="webcam-video" playsinline></video>
            <canvas id="overlay-canvas"></canvas>
            <div class="branding">
                <span>SALONICAS</span>
                <div class="greek-flag"></div>
            </div>
        </div>
    </div>

    <script>
        const videoElement = document.getElementById(«webcam-video»);
        const canvasElement = document.getElementById(«overlay-canvas»);
        const canvasCtx = canvasElement.getContext(«2d»);
        const loadingScreen = document.getElementById(«loading-screen»);
        const statusText = document.getElementById(«status-text»);
        const startBtn = document.getElementById(«start-btn»);

        // --- THREE.JS SETUP ---
        let scene, camera, renderer, earth;
        function initThree() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / (window.innerHeight * 0.6), 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight * 0.6);
            document.getElementById(«top-section»).appendChild(renderer.domElement);

            const geometry = new THREE.SphereGeometry(2, 64, 64);
            const texture = new THREE.TextureLoader().load(«https://unpkg.com/threejs-earth@0.0.1/build/textures/earth.jpg»);
            const material = new THREE.MeshPhongMaterial({ 
                map: texture,
                shininess: 5,
                bumpScale: 0.05
            });
            earth = new THREE.Mesh(geometry, material);
            scene.add(earth);

            const light = new THREE.DirectionalLight(0xffffff, 1);
            light.position.set(5, 3, 5);
            scene.add(light);
            scene.add(new THREE.AmbientLight(0x333333));

            camera.position.z = 5;
        }

        // --- MEDIAPIPE LOGIC ---
        let initialPinchDist = null;
        let baseScale = 5;

        function onResults(results) {
            loadingScreen.style.display = «none»;
            canvasCtx.save();
            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);

            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                for (const landmarks of results.multiHandLandmarks) {
                    // Draw Space-Age visual overlay
                    drawConnectors(canvasCtx, landmarks, HAND_CONNECTIONS, {color: «#00f2ff», lineWidth: 2});
                    drawLandmarks(canvasCtx, landmarks, {color: «#ffffff», lineWidth: 1, radius: 3});

                    // Follow Hand Movement (using first hand detected)
                    const indexFinger = landmarks[8];
                    earth.rotation.y = (indexFinger.x - 0.5) * 4;
                    earth.rotation.x = (indexFinger.y - 0.5) * 2;
                }

                // Pinch to Zoom (Two Hands)
                if (results.multiHandLandmarks.length === 2) {
                    const h1 = results.multiHandLandmarks[0][8];
                    const h2 = results.multiHandLandmarks[1][8];
                    const dist = Math.hypot(h1.x - h2.x, h1.y - h2.y);

                    if (initialPinchDist === null) {
                        initialPinchDist = dist;
                    } else {
                        const delta = (dist - initialPinchDist) * 10;
                        camera.position.z = Math.max(3, Math.min(8, baseScale - delta));
                    }
                } else {
                    initialPinchDist = null;
                    baseScale = camera.position.z;
                }
            }
            canvasCtx.restore();
        }

        const hands = new Hands({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
        });

        hands.setOptions({
            maxNumHands: 2,
            modelComplexity: 1,
            minDetectionConfidence: 0.7,
            minTrackingConfidence: 0.7
        });

        hands.onResults(onResults);

        // --- INITIALIZATION ---
        async function startSystem() {
            startBtn.style.display = «none»;
            statusText.innerText = «CONNECTING NEURAL LINK...»;
            
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: «user» } });
                videoElement.srcObject = stream;
                videoElement.play();

                const cameraPipe = new Camera(videoElement, {
                    onFrame: async () => {
                        canvasElement.width = videoElement.videoWidth;
                        canvasElement.height = videoElement.videoHeight;
                        await hands.send({ image: videoElement });
                    }
                });
                cameraPipe.start();
                initThree();
                animate();
            } catch (err) {
                statusText.innerText = «ERROR: CAMERA ACCESS DENIED»;
                console.error(err);
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            earth.rotation.y += 0.002; // Slow passive rotation
            renderer.render(scene, camera);
        }

        window.onload = () => {
            startBtn.style.display = «block»;
            statusText.innerText = «SYSTEM READY»;
            startBtn.onclick = startSystem;
        };

        window.addEventListener(«resize», () => {
            if (camera) {
                camera.aspect = window.innerWidth / (window.innerHeight * 0.6);
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight * 0.6);
            }
        });
    </script>
</body>
</html>
