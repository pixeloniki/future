<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
<title>Salonicas Vision OS</title>
<style>
html,body{margin:0;height:100%;background:#05070a;color:#fff;font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,sans-serif;overflow:hidden}
#app{display:flex;flex-direction:column;height:100%}
#top{height:60%;position:relative;background:radial-gradient(circle at center,#102030,#03060a 70%)}
#bottom{height:40%;position:relative;background:#000;overflow:hidden;border-top:1px solid rgba(0,242,255,.35)}
canvas,video{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;transform:scaleX(-1)}
#overlay{pointer-events:none}
#loading{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:14px;background:#020406;z-index:99}
.spinner{width:56px;height:56px;border-radius:50%;border:3px solid rgba(0,242,255,.15);border-top-color:#00f2ff;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.brand{position:absolute;right:10px;bottom:8px;padding:8px 12px;border:1px solid rgba(0,242,255,.45);border-radius:18px;background:rgba(0,0,0,.42);box-shadow:0 0 18px rgba(0,242,255,.18);backdrop-filter:blur(10px);font-size:12px;color:#00f2ff;z-index:5}
.title{position:absolute;left:10px;top:10px;padding:8px 12px;border-radius:18px;background:rgba(0,0,0,.25);border:1px solid rgba(0,242,255,.35);color:#00f2ff;font-size:12px;z-index:5}
.small{opacity:.75;font-size:12px}
button{padding:12px 18px;border-radius:16px;border:none;background:#00f2ff;color:#00161a;font-weight:700}
</style>
</head>
<body>
<div id='loading'><div class='spinner'></div><div>Initializing Vision Sensors...</div><button id='startBtn'>Enable Camera</button><div id='msg' class='small'></div></div>
<div id='app'>
<section id='top'><div class='title'>SALONICAS VISION OS · LIVE SPACE CONTROL</div></section>
<section id='bottom'>
<video id='video' playsinline autoplay muted></video>
<canvas id='overlay'></canvas>
<div class='brand'>🇬🇷 Salonicas • AI Vision</div>
</section>
</div>
<script src='https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js'></script>
<script src='https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/controls/OrbitControls.js'></script>
<script src='https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js'></script>
<script src='https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js'></script>
<script src='https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js'></script>
<script>
const loading=document.getElementById('loading'), msg=document.getElementById('msg');
const video=document.getElementById('video'); const overlay=document.getElementById('overlay'); const ctx=overlay.getContext('2d');
let stream, earth, camera3d, scene, renderer, pinchBase=null, targetZ=3.2, rotX=0, rotY=0;
function sizeOverlay(){overlay.width=video.clientWidth;overlay.height=video.clientHeight;} window.addEventListener('resize',sizeOverlay);
function initThree(){const top=document.getElementById('top'); scene=new THREE.Scene(); camera3d=new THREE.PerspectiveCamera(55,top.clientWidth/top.clientHeight,.1,100); camera3d.position.z=3.2; renderer=new THREE.WebGLRenderer({antialias:true,alpha:true}); renderer.setSize(top.clientWidth,top.clientHeight); top.appendChild(renderer.domElement);
const amb=new THREE.AmbientLight(0xffffff,.9); scene.add(amb); const dir=new THREE.DirectionalLight(0x66eeff,2); dir.position.set(5,2,4); scene.add(dir);
const stars=new THREE.BufferGeometry(); const pts=[]; for(let i=0;i<1200;i++){pts.push((Math.random()-.5)*20,(Math.random()-.5)*20,(Math.random()-.5)*20);} stars.setAttribute('position',new THREE.Float32BufferAttribute(pts,3)); scene.add(new THREE.Points(stars,new THREE.PointsMaterial({size:.02,color:0x66eeff})));
const tex=new THREE.TextureLoader().load('https://threejs.org/examples/textures/planets/earth_atmos_2048.jpg'); const bump=new THREE.TextureLoader().load('https://threejs.org/examples/textures/planets/earth_bump_2048.jpg');
const mat=new THREE.MeshStandardMaterial({map:tex,bumpMap:bump,bumpScale:.04,metalness:.2,roughness:.8}); earth=new THREE.Mesh(new THREE.SphereGeometry(1,64,64),mat); scene.add(earth);
window.addEventListener('resize',()=>{renderer.setSize(top.clientWidth,top.clientHeight);camera3d.aspect=top.clientWidth/top.clientHeight;camera3d.updateProjectionMatrix();}); animate();}
function animate(){requestAnimationFrame(animate); if(earth){earth.rotation.y+=0.003; earth.rotation.x += (rotY-earth.rotation.x)*0.06; earth.rotation.z += (rotX-earth.rotation.z)*0.06;} camera3d.position.z += (targetZ-camera3d.position.z)*0.08; renderer.render(scene,camera3d);}
async function startCamera(){try{stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'user',width:{ideal:1280},height:{ideal:720}},audio:false}); video.srcObject=stream; await video.play(); sizeOverlay(); loading.style.display='none'; initHands(); initThree();}catch(e){msg.textContent='Camera access denied or unavailable.'; console.error(e);}}
function initHands(){const hands=new Hands({locateFile:(file)=>`https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`}); hands.setOptions({maxNumHands:2,modelComplexity:1,minDetectionConfidence:.72,minTrackingConfidence:.72,selfieMode:true}); hands.onResults(onResults); const cam=new Camera(video,{onFrame:async()=>{await hands.send({image:video});},width:960,height:540}); cam.start();}
function onResults(results){ctx.clearRect(0,0,overlay.width,overlay.height); ctx.drawImage(results.image,0,0,overlay.width,overlay.height);
const hands=results.multiHandLandmarks||[]; ctx.lineWidth=2; ctx.shadowBlur=10; ctx.shadowColor='#00f2ff';
for(const lm of hands){drawConnectors(ctx,lm,HAND_CONNECTIONS,{color:'#00f2ff',lineWidth:2}); drawLandmarks(ctx,lm,{color:'#ffffff',radius:4});}
if(hands[0]){const p=hands[0][8]; rotX=(p.x-.5)*1.8; rotY=(p.y-.5)*1.8;}
if(hands.length===2){const a=hands[0][8], b=hands[1][8]; const d=Math.hypot(a.x-b.x,a.y-b.y); if(pinchBase===null) pinchBase=d; const delta=d-pinchBase; targetZ=Math.max(1.6,Math.min(7,3.2-delta*10));} else {pinchBase=null;}
}
startBtn.onclick=startCamera; window.addEventListener('load',()=>{if(navigator.mediaDevices?.getUserMedia) startCamera();});
</script>
</body>
</html>
