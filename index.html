<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SALONICAS VISION OS · EARTH TOUCH</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
            font-weight: 400;
            color: white;
        }

        /* loading overlay – disappears when camera ready */
        #loading-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #0b0f16;
            backdrop-filter: blur(8px);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            transition: opacity 0.6s cubic-bezier(0.23, 1, 0.32, 1);
            pointer-events: none;
        }
        .loading-spinner {
            width: 48px;
            height: 48px;
            border: 3px solid rgba(0, 242, 255, 0.2);
            border-top: 3px solid #00f2ff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            box-shadow: 0 0 20px #00f2ff66;
        }
        .loading-text {
            margin-top: 24px;
            color: #00f2ff;
            font-weight: 400;
            letter-spacing: 6px;
            text-transform: uppercase;
            font-size: 14px;
            text-shadow: 0 0 15px #00f2ff;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        #app {
            display: flex;
            flex-direction: column;
            width: 100vw;
            height: 100vh;
            position: relative;
            background: black;
        }

        /* TOP: 60% — THREE.js canvas */
        #canvas-container {
            flex: 0 0 60%;
            width: 100%;
            position: relative;
            overflow: hidden;
            background: radial-gradient(circle at 20% 30%, #0a1a2b, #03070e);
            border-bottom: 1.5px solid rgba(0, 242, 255, 0.4);
            box-shadow: inset 0 -10px 30px rgba(0,0,0,0.8), 0 0 40px rgba(0,242,255,0.1);
        }
        #three-canvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        /* BOTTOM: 40% — webcam + hand overlay */
        #webcam-section {
            flex: 0 0 40%;
            width: 100%;
            position: relative;
            background: #03070a;
            display: flex;
            align-items: center;
            justify-content: center;
            border-top: 1px solid #00f2ff33;
        }
        #webcam-wrapper {
            position: relative;
            width: 100%;
            height: 100%;
            max-width: 100%;
            overflow: hidden;
            background: #000;
        }
        #webcam-video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transform: scaleX(-1); /* mirror like a true selfie */
        }
        #hand-canvas {
            position: absolute;
            top: 0; left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            transform: scaleX(-1); /* mirror to match video */
        }

        /* BRANDING & UI OVERLAYS */
        .branding {
            position: fixed;
            bottom: 18px;
            right: 24px;
            z-index: 50;
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(2, 10, 20, 0.5);
            backdrop-filter: blur(12px);
            padding: 10px 18px;
            border-radius: 60px;
            border: 1px solid rgba(0, 242, 255, 0.35);
            box-shadow: 0 0 30px #00f2ff1a;
            pointer-events: none;
        }
        .branding span {
            color: white;
            font-weight: 500;
            letter-spacing: 3px;
            font-size: 20px;
            text-shadow: 0 0 20px #00f2ff;
        }
        .greek-flag {
            display: flex;
            height: 24px;
            width: 36px;
            background: linear-gradient(180deg, 
                #0D5EAF 0% 11.1%, white 11.1% 22.2%, 
                #0D5EAF 22.2% 33.3%, white 33.3% 44.4%,
                #0D5EAF 44.4% 55.5%, white 55.5% 66.6%,
                #0D5EAF 66.6% 77.7%, white 77.7% 88.8%,
                #0D5EAF 88.8% 100%);
            border-radius: 4px;
            box-shadow: 0 0 12px #00f2ff;
            position: relative;
            border: 1px solid #00f2ffaa;
        }
        .greek-flag::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 40%; height: 44%;
            background: #0D5EAF;
        }
        .greek-flag::after {
            content: "✚";
            position: absolute;
            top: 2px; left: 4px;
            color: white;
            font-size: 12px;
            font-weight: bold;
            text-shadow: 0 0 8px cyan;
        }

        /* status / hint */
        .gesture-hint {
            position: fixed;
            bottom: 24px;
            left: 24px;
            z-index: 50;
            color: #00f2ff;
            font-size: 13px;
            background: rgba(0,20,30,0.5);
            backdrop-filter: blur(8px);
            padding: 8px 18px;
            border-radius: 40px;
            border: 1px solid #00f2ff55;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            pointer-events: none;
            box-shadow: 0 0 20px #00f2ff33;
        }

        /* error fallback */
        #error-message {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            color: #ff4d6d;
            background: #0a0f1c;
            padding: 20px 30px;
            border: 1px solid #ff4d6d;
            border-radius: 24px;
            z-index: 200;
            display: none;
            backdrop-filter: blur(16px);
            text-align: center;
        }

        /* clean minimal */
        canvas:focus { outline: none; }
    </style>
    <!-- Import fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <div id="loading-screen">
        <div class="loading-spinner"></div>
        <div class="loading-text">INITIALIZING VISION</div>
    </div>
    <div id="error-message"></div>

    <div id="app">
        <div id="canvas-container">
            <canvas id="three-canvas"></canvas>
        </div>
        <div id="webcam-section">
            <div id="webcam-wrapper">
                <video id="webcam-video" autoplay playsinline muted></video>
                <canvas id="hand-canvas"></canvas>
            </div>
        </div>
    </div>

    <!-- Branding overlay -->
    <div class="branding">
        <span>SALONICAS</span>
        <div class="greek-flag"></div>
    </div>
    <div class="gesture-hint">⚡ MOVE HAND · PINCH TO ZOOM ⚡</div>

    <!-- CDNs -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1646424915/hands.js" crossorigin="anonymous"></script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        
        // --- DOM elements ---
        const loadingScreen = document.getElementById('loading-screen');
        const errorMsgDiv = document.getElementById('error-message');
        const video = document.getElementById('webcam-video');
        const handCanvas = document.getElementById('hand-canvas');
        const ctx = handCanvas.getContext('2d');
        const threeCanvas = document.getElementById('three-canvas');

        // --- state ---
        let cameraReady = false;
        let handsInstance = null;
        let handLandmarks = null;          // latest MediaPipe result
        let handPresence = false;
        
        // for pinch zoom logic
        let pinchStartDist = 0;
        let baseEarthScale = 1.8;           // nice size
        let earthScale = baseEarthScale;
        const MIN_SCALE = 0.9;
        const MAX_SCALE = 3.5;
        
        // Earth rotation target (from hand X/Y)
        let targetRotX = 0.0;
        let targetRotY = 0.0;
        let currentRotX = 0.0;
        let currentRotY = 0.0;
        
        // --- THREE.JS setup ---
        const scene = new THREE.Scene();
        scene.background = null; // transparent to show container gradient
        
        const camera = new THREE.PerspectiveCamera(45, (window.innerWidth * 0.6) / (window.innerHeight * 0.6), 0.1, 1000);
        camera.position.set(0, 0.2, 4.5);
        
        const renderer = new THREE.WebGLRenderer({ canvas: threeCanvas, alpha: true, antialias: true });
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = false; // not needed
        
        // --- Lighting (Apple/Nvidia aesthetic) ---
        const ambientLight = new THREE.AmbientLight(0x404066);
        scene.add(ambientLight);
        
        const dirLight1 = new THREE.DirectionalLight(0xffffff, 1.2);
        dirLight1.position.set(2, 3, 4);
        scene.add(dirLight1);
        
        const dirLight2 = new THREE.DirectionalLight(0x446688, 0.8);
        dirLight2.position.set(-3, 1, -2);
        scene.add(dirLight2);
        
        const pointLight = new THREE.PointLight(0x00aaff, 0.9, 10);
        pointLight.position.set(1, 2, 3);
        scene.add(pointLight);
        
        // Add subtle blue fill
        const fillLight = new THREE.PointLight(0x2266aa, 0.5);
        fillLight.position.set(-2, 0.5, 3);
        scene.add(fillLight);
        
        // --- Earth with high-end textures ---
        const textureLoader = new THREE.TextureLoader();
        // high-res earth maps (reliable CDN)
        const earthMap = textureLoader.load('https://threejs.org/examples/textures/planets/earth_atmos_2048.jpg');
        const earthSpecularMap = textureLoader.load('https://threejs.org/examples/textures/planets/earth_specular_2048.jpg');
        const earthNormalMap = textureLoader.load('https://threejs.org/examples/textures/planets/earth_normal_2048.jpg');
        const cloudMap = textureLoader.load('https://threejs.org/examples/textures/planets/earth_clouds_1024.png');
        
        // Earth group
        const earthGroup = new THREE.Group();
        
        const earthMaterial = new THREE.MeshPhongMaterial({
            map: earthMap,
            specularMap: earthSpecularMap,
            specular: new THREE.Color('grey'),
            shininess: 10,
            normalMap: earthNormalMap,
            normalScale: new THREE.Vector2(1.2, 1.2),
        });
        const earthMesh = new THREE.Mesh(new THREE.SphereGeometry(1.2, 64, 64), earthMaterial);
        earthGroup.add(earthMesh);
        
        // Clouds layer
        const cloudMaterial = new THREE.MeshPhongMaterial({
            map: cloudMap,
            transparent: true,
            opacity: 0.35,
            blending: THREE.AdditiveBlending,
            side: THREE.DoubleSide
        });
        const cloudMesh = new THREE.Mesh(new THREE.SphereGeometry(1.205, 64, 64), cloudMaterial);
        earthGroup.add(cloudMesh);
        
        // Add a subtle outer glow ring (futuristic)
        const ringGeometry = new THREE.TorusGeometry(1.42, 0.008, 32, 200);
        const ringMaterial = new THREE.MeshStandardMaterial({ color: 0x00f2ff, emissive: new THREE.Color(0x004466), transparent: true, opacity: 0.35 });
        const ring = new THREE.Mesh(ringGeometry, ringMaterial);
        ring.rotation.x = Math.PI / 2;
        ring.rotation.z = 0.3;
        earthGroup.add(ring);
        
        scene.add(earthGroup);
        
        // stars / particle field
        const starsGeometry = new THREE.BufferGeometry();
        const starsCount = 2000;
        const starPositions = new Float32Array(starsCount * 3);
        for (let i = 0; i < starsCount * 3; i += 3) {
            const r = 20 + Math.random() * 30;
            const theta = Math.random() * Math.PI * 2;
            const phi = Math.acos((Math.random() * 2) - 1);
            starPositions[i] = Math.sin(phi) * Math.cos(theta) * r;
            starPositions[i+1] = Math.sin(phi) * Math.sin(theta) * r;
            starPositions[i+2] = Math.cos(phi) * r;
        }
        starsGeometry.setAttribute('position', new THREE.BufferAttribute(starPositions, 3));
        const starsMaterial = new THREE.PointsMaterial({color: 0xffffff, size: 0.025, transparent: true});
        const stars = new THREE.Points(starsGeometry, starsMaterial);
        scene.add(stars);
        
        // initial rotation
        earthGroup.rotation.y = 2.8;
        earthGroup.rotation.x = 0.15;
        
        // --- resize handler ---
        function resize() {
            const container = document.getElementById('canvas-container');
            const width = container.clientWidth;
            const height = container.clientHeight;
            
            renderer.setSize(width, height);
            camera.aspect = width / height;
            camera.updateProjectionMatrix();
            
            // hand canvas resize to match video
            if (video.videoWidth) {
                handCanvas.width = video.videoWidth;
                handCanvas.height = video.videoHeight;
            } else {
                // fallback
                handCanvas.width = width;
                handCanvas.height = height;
            }
        }
        window.addEventListener('resize', resize);
        
        // --- Camera initialization with explicit permission ---
        async function initCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { 
                        facingMode: 'user',
                        width: { ideal: 1280 },
                        height: { ideal: 720 }
                    } 
                });
                video.srcObject = stream;
                await video.play();
                
                video.addEventListener('loadedmetadata', () => {
                    handCanvas.width = video.videoWidth;
                    handCanvas.height = video.videoHeight;
                    resize(); // sync three
                    
                    cameraReady = true;
                    loadingScreen.style.opacity = '0';
                    setTimeout(() => { loadingScreen.style.display = 'none'; }, 600);
                    
                    // initialize MediaPipe Hands after video ready
                    initMediaPipe();
                });
            } catch (err) {
                console.error('Camera error:', err);
                errorMsgDiv.style.display = 'block';
                errorMsgDiv.innerText = '⚠️ CAMERA ACCESS DENIED\nPlease allow camera and refresh.';
                loadingScreen.style.opacity = '0';
                setTimeout(() => { loadingScreen.style.display = 'none'; }, 300);
            }
        }
        
        // --- MediaPipe Hands setup ---
        function initMediaPipe() {
            const hands = new Hands({locateFile: (file) => {
                return `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`;
            }});
            
            hands.setOptions({
                maxNumHands: 2,
                modelComplexity: 1,
                minDetectionConfidence: 0.7,
                minTrackingConfidence: 0.5
            });
            
            hands.onResults(onHandResults);
            
            handsInstance = hands;
            
            // start processing loop
            function processFrame() {
                if (video.readyState >= 2) {
                    handsInstance.send({image: video});
                }
                requestAnimationFrame(processFrame);
            }
            processFrame();
        }
        
        // --- Hand results: draw overlay + compute gestures ---
        function onHandResults(results) {
            handLandmarks = results;
            handPresence = results.multiHandLandmarks && results.multiHandLandmarks.length > 0;
            
            // Draw on canvas
            drawHandOverlay(results);
            
            // Control Earth from hand data
            if (handPresence) {
                updateEarthFromHands(results);
            } else {
                // smooth auto-rotation when no hands
                targetRotY += 0.002;
                targetRotX = 0.15;
            }
        }
        
        function drawHandOverlay(results) {
            ctx.clearRect(0, 0, handCanvas.width, handCanvas.height);
            if (!results.multiHandLandmarks) return;
            
            const landmarksList = results.multiHandLandmarks;
            
            // Cyan neon style
            ctx.lineWidth = 3.5;
            ctx.shadowColor = '#00f2ff';
            ctx.shadowBlur = 16;
            
            for (const landmarks of landmarksList) {
                // Draw connectors (glowing lines)
                const connections = [
                    [0,1],[1,2],[2,3],[3,4], // thumb
                    [0,5],[5,6],[6,7],[7,8], // index
                    [0,9],[9,10],[10,11],[11,12], // middle
                    [0,13],[13,14],[14,15],[15,16], // ring
                    [0,17],[17,18],[18,19],[19,20] // pinky
                ];
                
                ctx.beginPath();
                ctx.strokeStyle = '#00f2ff';
                ctx.lineWidth = 2.8;
                for (const [start, end] of connections) {
                    const s = landmarks[start];
                    const e = landmarks[end];
                    ctx.moveTo(s.x * handCanvas.width, s.y * handCanvas.height);
                    ctx.lineTo(e.x * handCanvas.width, e.y * handCanvas.height);
                }
                ctx.stroke();
                
                // Draw white dots
                ctx.shadowBlur = 18;
                ctx.fillStyle = '#ffffff';
                for (const lm of landmarks) {
                    ctx.beginPath();
                    ctx.arc(lm.x * handCanvas.width, lm.y * handCanvas.height, 4.5, 0, 2*Math.PI);
                    ctx.fill();
                }
                // inner cyan dot for extra glow
                ctx.shadowBlur = 20;
                ctx.fillStyle = '#a0f0ff';
                for (const lm of landmarks) {
                    ctx.beginPath();
                    ctx.arc(lm.x * handCanvas.width, lm.y * handCanvas.height, 2.5, 0, 2*Math.PI);
                    ctx.fill();
                }
            }
            ctx.shadowBlur = 0;
        }
        
        function updateEarthFromHands(results) {
            const hands = results.multiHandLandmarks;
            if (hands.length === 0) return;
            
            // Use first hand for rotation (palm center approx: wrist 0 + middle finger mcp 9)
            const hand0 = hands[0];
            const wrist = hand0[0];
            const middleMcp = hand0[9];
            
            // normalized X/Y (0..1) -> map to rotation range
            const nx = wrist.x; 
            const ny = wrist.y;
            
            // mapping: x -> y-rotation (-2.0 to 2.0), y -> x-rotation (-0.3 to 0.8)
            targetRotY = (nx * 4.0) - 2.0;  
            targetRotX = (ny * 1.0) + 0.0;
            
            // Pinch zoom: if two hands present
            if (hands.length === 2) {
                const h1 = hands[0];
                const h2 = hands[1];
                
                // use wrist or index tip? better: index tip (landmark 8) for precision
                const p1 = h1[8];
                const p2 = h2[8];
                
                const dx = p1.x - p2.x;
                const dy = p1.y - p2.y;
                const dist = Math.sqrt(dx*dx + dy*dy);
                
                if (pinchStartDist === 0) {
                    pinchStartDist = dist;
                } else {
                    const delta = dist - pinchStartDist;
                    const sensitivity = 4.5;
                    let newScale = earthScale + delta * sensitivity;
                    newScale = Math.min(MAX_SCALE, Math.max(MIN_SCALE, newScale));
                    earthScale = newScale;
                }
                pinchStartDist = dist;
            } else {
                pinchStartDist = 0;
            }
            
            // Apply scale to earthGroup
            earthGroup.scale.set(earthScale, earthScale, earthScale);
        }
        
        // --- Animation Loop ---
        function animate() {
            requestAnimationFrame(animate);
            
            // smooth rotation interpolation
            currentRotY += (targetRotY - currentRotY) * 0.08;
            currentRotX += (targetRotX - currentRotX) * 0.08;
            
            earthGroup.rotation.x = currentRotX;
            earthGroup.rotation.y = currentRotY;
            
            // cloud rotation slightly faster
            if (earthGroup.children[1]) {
                earthGroup.children[1].rotation.y += 0.0008;
            }
            
            // stars slowly rotate
            stars.rotation.y += 0.0002;
            
            renderer.render(scene, camera);
            
            // keep hand canvas updated with video dimensions if changed
            if (video.videoWidth && (handCanvas.width !== video.videoWidth)) {
                handCanvas.width = video.videoWidth;
                handCanvas.height = video.videoHeight;
            }
        }
        
        // --- start everything ---
        resize();
        animate();
        
        // Trigger camera on load (user gesture may be needed on some browsers)
        window.addEventListener('load', () => {
            // immediate request, but also add click fallback
            initCamera().catch(e => {
                console.warn('auto camera failed, waiting for tap');
                loadingScreen.style.opacity = '0.8';
                document.body.addEventListener('click', function onClick() {
                    initCamera();
                    document.body.removeEventListener('click', onClick);
                }, { once: true });
            });
        });
        
        // ensure loading disappears after max 5s if stuck
        setTimeout(() => {
            if (!cameraReady) {
                loadingScreen.style.opacity = '0';
                setTimeout(() => loadingScreen.style.display = 'none', 500);
            }
        }, 6000);
        
        // extra resize on orientation change
        window.addEventListener('orientationchange', () => setTimeout(resize, 30));
        
        // handle possible video play errors
        video.addEventListener('error', (e) => {
            errorMsgDiv.style.display = 'block';
            errorMsgDiv.innerText = '📷 CAMERA ERROR · RELOAD';
        });
        
        console.log('✨ SALONICAS VISION OS · Hand tracking + Earth control');
    </script>
</body>
</html>
