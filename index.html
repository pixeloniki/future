<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <title>Salonicas Ultimate Vision</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; padding: 0; background: #000; overflow: hidden; font-family: sans-serif; }
        
        /* Η κάμερα σε πλήρη οθόνη ως φόντο */
        #input_video {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            object-fit: cover;
            transform: scaleX(-1);
            z-index: 0;
            filter: brightness(0.6) contrast(1.1);
        }

        /* Το επίπεδο όπου σχεδιάζονται οι αισθητήρες */
        #output_canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1;
            transform: scaleX(-1);
        }

        /* Το επίπεδο για τη Γη */
        #threejs_canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 2;
            pointer-events: none;
        }

        /* Φουτουριστικό UI */
        #interface {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            pointer-events: none;
            color: #00e5ff;
            border: 10px solid rgba(0, 229, 255, 0.1);
            box-sizing: border-box;
        }

        .header { position: absolute; top: 30px; left: 50px; text-shadow: 0 0 10px #00e5ff; }
        .footer { position: absolute; bottom: 40px; right: 50px; text-align: right; }
        .footer h1 { font-size: 2.5rem; margin: 0; text-transform: uppercase; color: #fff; text-shadow: 0 0 20px #00e5ff; }
        .flag { width: 45px; margin-top: 10px; border: 1px solid white; }
    </style>
</head>
<body>

<video id="input_video"></video>
<canvas id="output_canvas"></canvas>
<div id="threejs_canvas"></div>

<div id="interface">
    <div class="header">
        ΣΥΣΤΗΜΑ : ΕΝΕΡΓΟ<br>
        ΑΙΣΘΗΤΗΡΕΣ : LIVE FEED<br>
        v3.0 - ΕΛΛΑΣ
    </div>
    <div class="footer">
        <p>HOLOGRAPHIC INTERFACE ENGINE</p>
        <h1>CREATED BY SALONICAS</h1>
        <img src="https://upload.wikimedia.org/wikipedia/commons/5/5c/Flag_of_Greece.svg" class="flag">
    </div>
</div>

<script>
    const videoElement = document.getElementById('input_video');
    const canvasElement = document.getElementById('output_canvas');
    const canvasCtx = canvasElement.getContext('2d');

    // --- THREE.JS SETUP ---
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.getElementById('threejs_canvas').appendChild(renderer.domElement);

    const light = new THREE.PointLight(0xffffff, 1.5);
    light.position.set(5, 5, 5);
    scene.add(light);
    scene.add(new THREE.AmbientLight(0x404040));

    const earthGeom = new THREE.SphereGeometry(1.8, 64, 64);
    const earthTex = new THREE.TextureLoader().load('https://raw.githubusercontent.com/mrdoob/three.js/master/examples/textures/planets/earth_atmos_2048.jpg');
    const earthMat = new THREE.MeshPhongMaterial({ map: earthTex });
    const earth = new THREE.Mesh(earthGeom, earthMat);
    scene.add(earth);
    camera.position.z = 5;

    // --- MEDIAPIPE HANDS SETUP ---
    const hands = new Hands({locateFile: (file) => {
        return `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`;
    }});

    hands.setOptions({
        maxNumHands: 1,
        modelComplexity: 1,
        minDetectionConfidence: 0.7,
        minTrackingConfidence: 0.7
    });

    hands.onResults((results) => {
        // Καθαρισμός του canvas
        canvasElement.width = window.innerWidth;
        canvasElement.height = window.innerHeight;
        canvasCtx.save();
        canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);

        if (results.multiHandLandmarks) {
            for (const landmarks of results.multiHandLandmarks) {
                // Σχεδίαση των αισθητήρων και των συνδέσεων
                drawConnectors(canvasCtx, landmarks, HAND_CONNECTIONS, {color: '#00e5ff', lineWidth: 3});
                drawLandmarks(canvasCtx, landmarks, {color: '#ffffff', lineWidth: 1, radius: 4});

                // Έλεγχος της Γης με το κέντρο της παλάμης
                const palm = landmarks[9];
                const targetX = (palm.x - 0.5) * -10;
                const targetY = (palm.y - 0.5) * -10;
                
                earth.position.x = targetX;
                earth.position.y = targetY;

                // Δυναμικό Zoom βάσει ύψους αντίχειρα
                camera.position.z = 4 + (palm.y * 2);
            }
        }
        canvasCtx.restore();
    });

    // Εκκίνηση Κάμερας
    const cameraHelper = new Camera(videoElement, {
        onFrame: async () => {
            await hands.send({image: videoElement});
        },
        width: 1280,
        height: 720
    });
    cameraHelper.start();

    // Loop
    function animate() {
        requestAnimationFrame(animate);
        earth.rotation.y += 0.005;
        renderer.render(scene, camera);
    }

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });

    animate();
</script>
</body>
</html>
