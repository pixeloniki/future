<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Salonicas Vision OS</title>
<style>
  /* Reset and base styles */
html, body {
  margin: 0;
  padding: 0;
  background: #000;
  font-family: 'Helvetica Neue', sans-serif;
  height: 100%;
  width: 100%;
  overflow: hidden;
}

/* Loading overlay */
#loading {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background: #000;
  display: flex;
  align-items: center;
  justify-content: center;
  color: #0ff;
  font-size: 2em;
  z-index: 9999;
}

/* Container split vertically */
#container {
  display: flex;
  flex-direction: column;
  height: 100vh;
  width: 100%;
}

/* Top section: 60% height */
#top {
  flex: 3 1 60%;
  position: relative;
  background: #000;
  overflow: hidden;
}

/* Bottom section: 40% height */
#bottom {
  flex: 2 1 40%;
  position: relative;
  background: #000;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}

/* Canvas styles */
canvas {
  width: 100%;
  height: 100%;
  display: block;
}

/* Webcam video styling (hidden, used as source) */
#webcam {
  position: absolute;
  width: 100%; height: 100%;
  object-fit: cover;
  z-index: 1;
  display: none;
}

/* Branding overlay */
#branding {
  position: absolute;
  bottom: 10px;
  right: 10px;
  display: flex;
  align-items: center;
  font-family: 'Helvetica Neue', sans-serif;
  font-size: 1em;
  color: #fff;
  z-index: 10;
  background: rgba(0,0,0,0.3);
  padding: 5px 10px;
  border-radius: 10px;
}
#flag {
  width: 24px;
  height: 16px;
  margin-right: 8px;
}

/* Neon glow for UI elements */
.neon {
  text-shadow: 0 0 5px #00f2ff, 0 0 10px #00f2ff, 0 0 20px #00f2ff, 0 0 40px #00f2ff;
}
</style>
</head>
<body>
<div id="loading">Loading...</div>
<div id="container">
  <div id="top">
    <canvas id="threeCanvas"></canvas>
  </div>
  <div id="bottom">
    <video id="webcam" autoplay playsinline muted></video>
  </div>
  <div id="branding" class="neon">
    <img id="flag" src="https://upload.wikimedia.org/wikipedia/commons/5/5c/Flag_of_Greece.svg" alt="Greek Flag" />
    Salonicas Vision OS
  </div>
</div>

<!-- Include libraries via CDN -->
<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

<script>
(async () => {
  const loading = document.getElementById('loading');

  // Request camera permission explicitly
  async function initCamera() {
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ video: true });
      document.getElementById('webcam').srcObject = stream;
      return stream;
    } catch (e) {
      alert('Camera permission is required.');
      throw e;
    }
  }

  await initCamera();

  // Hide loading
  loading.style.display = 'none';

  // ==========================
  // Three.js setup
  // ==========================
  const canvas = document.getElementById('threeCanvas');
  const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: false });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(window.devicePixelRatio);

  const scene = new THREE.Scene();

  // Camera
  const camera = new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 0.1, 1000);
  camera.position.z = 2;

  // Lighting
  const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
  scene.add(ambientLight);
  const directionalLight = new THREE.DirectionalLight(0xffffff, 1);
  directionalLight.position.set(5,5,5);
  scene.add(directionalLight);

  // Earth geometry and material
  const earthGeometry = new THREE.SphereGeometry(0.5, 64, 64);
  const earthMaterial = new THREE.MeshStandardMaterial({
    color: 0x222222,
    metalness: 0.8,
    roughness: 0.3,
    map: new THREE.TextureLoader().load('https://images.unsplash.com/photo-1507525428034-b723cf961d3e?ixlib=rb-4.0.1&auto=format&fit=crop&w=1024&q=80') // Earth texture
  });
  const earthMesh = new THREE.Mesh(earthGeometry, earthMaterial);
  scene.add(earthMesh);

  // Handle resize
  window.addEventListener('resize', () => {
    const width = window.innerWidth;
    const height = window.innerHeight * 0.6; // Top section
    renderer.setSize(width, height);
    camera.aspect = width / height;
    camera.updateProjectionMatrix();
  });

  // ==========================
  // MediaPipe Hands setup
  // ==========================
  const videoElement = document.getElementById('webcam');

  const hands = new Hands({locateFile: (file) => {
    return `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`;
  }});
  hands.setOptions({
    maxNumHands: 2,
    modelComplexity: 1,
    minDetectionConfidence: 0.8,
    minTrackingConfidence: 0.8
  });

  let landmarks = [];
  let handConnections = [];
  let previousDistance = null;
  let isPinching = false;
  let scale = 1;

  hands.onResults(results => {
    landmarks = results.multiHandLandmarks || [];
    handConnections = results.multiHandConnections || [];
  });

  // Initialize camera for MediaPipe
  const cameraUtils = new Camera(videoElement, {
    onFrame: async () => {
      await hands.send({image: videoElement});
    },
    width: 640,
    height: 480
  });
  cameraUtils.start();

  // ==========================
  // Drawing overlays on webcam
  // ==========================
  const ctx = document.createElement('canvas').getContext('2d');

  function drawOverlay() {
    const videoWidth = videoElement.videoWidth;
    const videoHeight = videoElement.videoHeight;
    ctx.canvas.width = videoWidth;
    ctx.canvas.height = videoHeight;

    ctx.clearRect(0, 0, videoWidth, videoHeight);

    // Draw landmarks
    for (const hand of landmarks) {
      // Draw white dots
      for (const lm of hand) {
        ctx.beginPath();
        ctx.arc(lm.x * videoWidth, lm.y * videoHeight, 4, 0, 2*Math.PI);
        ctx.fillStyle = 'white';
        ctx.fill();
      }

      // Draw connections with neon cyan lines
      for (const connection of handConnections) {
        const [startIdx, endIdx] = connection;
        const start = hand[startIdx];
        const end = hand[endIdx];
        ctx.beginPath();
        ctx.moveTo(start.x * videoWidth, start.y * videoHeight);
        ctx.lineTo(end.x * videoWidth, end.y * videoHeight);
        ctx.strokeStyle = '#00f2ff';
        ctx.lineWidth = 2;
        ctx.shadowColor = '#00f2ff';
        ctx.shadowBlur = 4;
        ctx.stroke();
      }
    }
  }

  // ==========================
  // Main animation loop
  // ==========================
  let clock = new THREE.Clock();

  // Variables for hand position
  let targetX = 0;
  let targetY = 0;

  // Variables for pinch zoom
  let initialPinchDistance = null;
  let initialScale = 1;

  function getAveragePosition() {
    if (landmarks.length === 0) return null;
    let sumX = 0, sumY=0, count=0;
    for (const hand of landmarks) {
      for (const lm of hand) {
        sumX += lm.x;
        sumY += lm.y;
        count++;
      }
    }
    return {x: sumX / count, y: sumY / count};
  }

  function getPinchDistance() {
    if (landmarks.length < 2) return null;
    // Use thumb tip (4) and index finger tip (8) of first hand for pinch
    const hand = landmarks[0];
    const thumbTip = hand[4];
    const indexTip = hand[8];
    const dx = (thumbTip.x - indexTip.x) * window.innerWidth;
    const dy = (thumbTip.y - indexTip.y) * window.innerHeight;
    return Math.hypot(dx, dy);
  }

  // Animate
  function animate() {
    requestAnimationFrame(animate);

    // Draw overlay
    drawOverlay();

    // Calculate average hand position for Earth movement
    const avgPos = getAveragePosition();
    if (avgPos) {
      // Map to [-1,1]
      targetX = (avgPos.x - 0.5) * 2;
      targetY = (avgPos.y - 0.5) * -2; // invert Y
    }

    // Smoothly interpolate Earth position
    earthMesh.position.x += (targetX * 0.02 - earthMesh.position.x) * 0.1;
    earthMesh.position.y += (targetY * 0.02 - earthMesh.position.y) * 0.1;

    // Pinch-to-zoom logic
    const currentDistance = getPinchDistance();
    if (currentDistance !== null && currentDistance !== 0) {
      if (initialPinchDistance === null) {
        initialPinchDistance = currentDistance;
        initialScale = scale;
      } else {
        const delta = currentDistance - initialPinchDistance;
        scale = initialScale + delta * 0.005;
        scale = Math.max(0.5, Math.min(2, scale));
        earthMesh.scale.setScalar(scale);
      }
    } else {
      initialPinchDistance = null;
    }

    // Animate Earth rotation
    earthMesh.rotation.y += 0.001;

    renderer.render(scene, camera);
  }

  animate();

  // ==========================
  // Resize handling
  // ==========================
  window.addEventListener('resize', () => {
    const width = window.innerWidth;
    const height = window.innerHeight * 0.6;
    renderer.setSize(width, height);
    camera.aspect = width / height;
    camera.updateProjectionMatrix();
  });

})();
</script>
</body>
</html>
