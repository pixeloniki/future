<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Salonicas Vision Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        canvas { display: block; }
        
        /* Φουτουριστικό UI */
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            color: rgba(0, 255, 255, 0.8);
            border: 2px solid rgba(0, 255, 255, 0.2);
            box-sizing: border-box;
        }

        #header {
            position: absolute;
            top: 20px;
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 0 40px;
            box-sizing: border-box;
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .watermark {
            position: absolute;
            bottom: 30px;
            right: 40px;
            text-align: right;
        }

        .watermark h1 { margin: 0; font-size: 1.5rem; color: #fff; text-shadow: 0 0 10px #00d2ff; }
        .watermark p { margin: 5px 0 0; font-size: 0.8rem; opacity: 0.7; }

        .flag {
            width: 40px;
            height: auto;
            border: 1px solid rgba(255,255,255,0.3);
            margin-left: 10px;
        }

        #video-container {
            position: absolute;
            bottom: 20px;
            left: 20px;
            width: 200px;
            height: 150px;
            border: 2px solid rgba(0, 255, 255, 0.5);
            border-radius: 10px;
            overflow: hidden;
            transform: scaleX(-1); /* Mirror effect */
        }
        
        video { width: 100%; height: 100%; object-fit: cover; }

        .symbols {
            position: absolute;
            top: 50%;
            left: 20px;
            transform: translateY(-50%);
            font-size: 2rem;
            display: flex;
            flex-direction: column;
            gap: 20px;
            opacity: 0.5;
        }
    </style>
</head>
<body>

    <div id="ui-layer">
        <div id="header">
            <div>ΣΥΣΤΗΜΑ ΕΝΤΟΠΙΣΜΟΥ : ΕΝΕΡΓΟ</div>
            <div style="display: flex; align-items: center;">
                ΕΛΛΑΣ <img src="https://upload.wikimedia.org/wikipedia/commons/5/5c/Flag_of_Greece.svg" class="flag">
            </div>
        </div>

        <div class="symbols">
            <span>Ω</span>
            <span>Φ</span>
            <span>Ψ</span>
            <span>Δ</span>
        </div>

        <div class="watermark">
            <p>FUTURE INTERFACE v3.0</p>
            <h1>CREATED BY SALONICAS</h1>
        </div>
    </div>

    <div id="video-container">
        <video id="input_video"></video>
    </div>

    <script>
        const videoElement = document.getElementById('input_video');
        
        // Three.js Setup
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // Δημιουργία σωματιδίων (Particles) όπως στο βίντεο
        const particlesGeometry = new THREE.BufferGeometry();
        const particlesCount = 5000;
        const posArray = new Float32Array(particlesCount * 3);

        for(let i=0; i < particlesCount * 3; i++) {
            posArray[i] = (Math.random() - 0.5) * 10;
        }

        particlesGeometry.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
        const particlesMaterial = new THREE.PointsMaterial({
            size: 0.02,
            color: 0x00d2ff,
            transparent: true,
            blending: THREE.AdditiveBlending
        });

        const particlesMesh = new THREE.Points(particlesGeometry, particlesMaterial);
        scene.add(particlesMesh);

        camera.position.z = 5;

        // MediaPipe Hands Setup
        const hands = new Hands({locateFile: (file) => {
            return `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`;
        }});

        hands.setOptions({
            maxNumHands: 1,
            modelComplexity: 1,
            minDetectionConfidence: 0.5,
            minTrackingConfidence: 0.5
        });

        hands.onResults((results) => {
            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                const hand = results.multiHandLandmarks[0];
                // Χρησιμοποιούμε τον δείκτη (index finger tip) για να κινήσουμε τα σωματίδια
                const x = (hand[8].x - 0.5) * 10;
                const y = -(hand[8].y - 0.5) * 10;
                
                particlesMesh.position.x = -x; // Mirroring
                particlesMesh.position.y = y;
                particlesMesh.rotation.y += 0.05;
                particlesMaterial.color.setHex(0xff00ff); // Αλλαγή χρώματος όταν ανιχνεύεται χέρι
            } else {
                particlesMaterial.color.setHex(0x00d2ff);
            }
        });

        const cam = new Camera(videoElement, {
            onFrame: async () => {
                await hands.send({image: videoElement});
            },
            width: 640,
            height: 480
        });
        cam.start();

        // Animation Loop
        function animate() {
            requestAnimationFrame(animate);
            particlesMesh.rotation.x += 0.001;
            particlesMesh.rotation.y += 0.001;
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
